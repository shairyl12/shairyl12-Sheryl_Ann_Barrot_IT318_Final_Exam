<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Register Student</h1>
        <form action="/save" method="POST">
            <input type="text" name="student_id" placeholder="Student ID (e.g. 2023-0001)" required>
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="text" name="course" placeholder="Course (e.g. BSIT)" required>
            <input type="text" name="year_level" placeholder="Year Level (e.g. 3rd Year)" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <button type="submit">Save Student</button>
        </form>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
